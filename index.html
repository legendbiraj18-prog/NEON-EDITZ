<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON EDIT | Live Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; }
        .tall { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; }
        .neon-blue { text-shadow: 0 0 15px rgba(59, 130, 246, 0.8); }
        .neon-green { text-shadow: 0 0 20px rgba(34, 197, 94, 0.8); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Success Animation Layer */
        #order-success {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 999; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="order-success">
        <div class="text-green-500 text-9xl mb-4 neon-green">✓</div>
        <h2 class="tall text-6xl neon-green">ORDER SUCCESSFUL</h2>
        <p class="text-gray-500 uppercase tracking-widest mt-2">Check your email for download link</p>
    </div>

    <nav class="glass fixed w-full z-50 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl tall font-bold tracking-widest">NEON<span class="text-blue-500 neon-blue">EDIT</span></div>
        <div class="flex items-center space-x-5">
            <button onclick="document.getElementById('upload-modal').classList.remove('hidden')" class="bg-blue-600/20 border border-blue-500 text-blue-400 px-4 py-1.5 rounded-full text-xs font-bold hover:bg-blue-600 hover:text-white transition">UPLOAD</button>
            <div class="relative cursor-pointer" onclick="alert('Cart is empty')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            </div>
        </div>
    </nav>

    <header class="pt-44 pb-20 text-center px-4">
        <h1 class="text-7xl md:text-9xl tall font-black leading-none mb-6">
            <span class="text-white">UPGRADE</span><br>
            <span class="text-blue-500 neon-blue">YOUR EDITS</span>
        </h1>
        <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase">Premium Cinematic Digital Assets</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-40">
        <h3 class="tall text-3xl mb-10 text-gray-400">TRENDING ASSETS</h3>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="upload-modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[2rem] w-full max-w-lg border-blue-500 border-2">
            <h2 class="tall text-4xl mb-6 neon-blue">ADD ASSET</h2>
            <div class="space-y-4">
                <input id="upName" type="text" placeholder="Name" class="w-full bg-black border border-gray-800 p-4 rounded-xl outline-none">
                <input id="upPrice" type="number" placeholder="Price (0 for Free)" class="w-full bg-black border border-gray-800 p-4 rounded-xl outline-none">
                <input id="upImg" type="text" placeholder="Image URL (Imgur/Pexels link)" class="w-full bg-black border border-gray-800 p-4 rounded-xl outline-none">
            </div>
            <div class="flex space-x-3 mt-8">
                <button onclick="saveAsset()" class="flex-1 bg-blue-600 py-4 rounded-xl font-bold tall text-xl transition">PUBLISH</button>
                <button onclick="document.getElementById('upload-modal').classList.add('hidden')" class="px-6 py-4 text-gray-500">BACK</button>
            </div>
        </div>
    </div>

    <script>
        // Sample Data for First Look
        const defaultAssets = [
            { name: "Cyber Glitch 4K", price: 0, img: "https://images.pexels.com/photos/2832382/pexels-photo-2832382.jpeg?w=400" },
            { name: "Cinematic Risers", price: 15, img: "https://images.pexels.com/photos/1105666/pexels-photo-1105666.jpeg?w=400" },
            { name: "Anime Speed Lines", price: 0, img: "https://images.pexels.com/photos/16111626/pexels-photo-16111626.jpeg?w=400" }
        ];

        let assets = JSON.parse(localStorage.getItem('neon_v3')) || defaultAssets;

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = assets.map((item, index) => `
                <div class="glass p-5 rounded-[2.5rem] border-gray-900 hover:border-blue-500 transition-all duration-300 group">
                    <img src="${item.img}" class="w-full h-44 object-cover rounded-3xl mb-5 group-hover:scale-105 transition duration-500">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="text-xl font-bold tracking-tighter">${item.name}</h4>
                        <span class="font-black ${item.price == 0 ? 'text-green-500 neon-green' : 'text-blue-500'}">
                            ${item.price == 0 ? 'FREE' : '$' + item.price}
                        </span>
                    </div>
                    <button onclick="buyNow(${item.price})" class="w-full py-3.5 rounded-2xl border-2 ${item.price == 0 ? 'border-green-600 text-green-500' : 'border-blue-600 text-blue-500'} font-bold tall text-lg hover:bg-white hover:text-black transition duration-300">
                        ${item.price == 0 ? 'DOWNLOAD' : 'BUY NOW'}
                    </button>
                    <button onclick="deleteAsset(${index})" class="mt-4 text-[9px] text-gray-800 hover:text-red-500 block w-full text-center uppercase tracking-widest">Delete</button>
                </div>
            `).join('');
        }

        function saveAsset() {
            const name = document.getElementById('upName').value;
            const price = document.getElementById('upPrice').value;
            const img = document.getElementById('upImg').value || "https://via.placeholder.com/400";
            if(!name) return;
            assets.unshift({ name, price: parseInt(price), img });
            localStorage.setItem('neon_v3', JSON.stringify(assets));
            render();
            document.getElementById('upload-modal').classList.add('hidden');
        }

        function buyNow(price) {
            if(price === 0) {
                alert("Download Started!");
            } else {
                const modal = document.getElementById('order-success');
                modal.style.display = 'flex';
                setTimeout(() => { modal.style.display = 'none'; }, 3000);
            }
        }

        function deleteAsset(i) {
            assets.splice(i,1);
            localStorage.setItem('neon_v3', JSON.stringify(assets));
            render();
        }

        render();
    </script>
</body>
</html>
