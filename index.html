<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON EDIT | Premium SFX & VFX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Custom Neon Glow Utilities */
        .glow-text-blue { text-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6; }
        .glow-text-red { text-shadow: 0 0 10px #ef4444, 0 0 20px #ef4444; }
        .glow-text-green { text-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e; }
        .glow-text-white { text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff; }

        .glow-border-blue { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .glow-border-red { border: 1px solid #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        .glow-border-green { border: 1px solid #22c55e; box-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
        
        .hover-glow-white:hover { box-shadow: 0 0 25px rgba(255, 255, 255, 0.6); transition: 0.3s; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #0a0a0a;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <nav class="glass-nav fixed w-full z-50 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-black tracking-tighter glow-text-white">NEON<span class="text-blue-500">EDIT</span></div>
        <div class="hidden md:flex space-x-8 font-medium">
            <a href="#" class="hover:glow-text-blue transition">Browse</a>
            <a href="#" class="hover:glow-text-blue transition">Library</a>
            <a href="#" class="hover:glow-text-blue transition">Pricing</a>
        </div>
        <div class="flex items-center space-x-6">
            <button class="hover:glow-text-white">Login</button>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-blue-600 text-[10px] rounded-full px-1.5 py-0.5">0</span>
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-6 text-center">
        <h1 class="text-6xl md:text-8xl font-black mb-8 glow-text-white uppercase tracking-tighter">
            Upgrade Your <span class="text-blue-500 glow-text-blue">Edits</span>
        </h1>
        <div class="max-w-2xl mx-auto relative group">
            <input type="text" placeholder="Search for VFX, SFX, Transitions..." 
                   class="w-full bg-black border border-gray-800 rounded-full py-4 px-8 outline-none focus:glow-border-blue transition-all duration-500">
            <button class="absolute right-4 top-3 px-6 py-1.5 bg-blue-600 rounded-full font-bold hover:bg-blue-400 transition">Search</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold glow-text-white">Trending Assets</h2>
            <div class="flex space-x-4">
                <button class="text-xs uppercase tracking-widest border border-gray-700 px-4 py-1 rounded hover:glow-border-blue transition">VFX</button>
                <button class="text-xs uppercase tracking-widest border border-gray-700 px-4 py-1 rounded hover:glow-border-blue transition">SFX</button>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-80 bg-black border-l border-gray-800 transform translate-x-full transition-transform duration-300 z-[60] p-6">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-xl font-bold">Your Cart</h3>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-white">Close</button>
        </div>
        <div id="cart-items" class="space-y-4">
            </div>
        <div class="absolute bottom-10 left-6 right-6">
            <button class="w-full py-4 bg-blue-600 font-bold rounded-lg glow-border-blue">Checkout</button>
        </div>
    </div>

    <script>
        const assets = [
            { id: 1, name: "Cyber Glitch Transition", type: "VFX", price: 0, color: "green", img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=400&q=80" },
            { id: 2, name: "Cinematic Risers Pack", type: "SFX", price: 29, color: "red", img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=400&q=80" },
            { id: 3, name: "Anamorphic Lens Flares", type: "VFX", price: 45, color: "red", img: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=400&q=80" },
            { id: 4, name: "VHS Retro Overlay", type: "VFX", price: 0, color: "green", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=400&q=80" },
            { id: 5, name: "Heavy Impact Bundle", type: "SFX", price: 15, color: "red", img: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=400&q=80" },
            { id: 6, name: "Gold Dust Particles", type: "VFX", price: 50, color: "red", img: "https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=400&q=80" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = assets.map(asset => `
                <div class="product-card rounded-2xl overflow-hidden border border-gray-900 hover:glow-border-blue p-4">
                    <img src="${asset.img}" class="w-full h-48 object-cover rounded-xl mb-4" alt="${asset.name}">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg">${asset.name}</h3>
                        <span class="text-xs font-black glow-text-${asset.color} uppercase">
                            ${asset.price === 0 ? 'Free' : '$' + asset.price}
                        </span>
                    </div>
                    <p class="text-gray-500 text-sm mb-6">${asset.type} Asset</p>
                    
                    ${asset.price === 0 ? 
                        `<button onclick="downloadAsset('${asset.name}')" class="w-full py-2 border border-green-500 text-green-500 rounded-lg font-bold hover:bg-green-500 hover:text-black transition duration-300">DOWNLOAD</button>` : 
                        `<button onclick="addToCart(${asset.id})" class="w-full py-2 border border-red-500 text-red-500 rounded-lg font-bold hover:bg-red-500 hover:text-white transition duration-300">ADD TO CART</button>`
                    }
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = assets.find(a => a.id === id);
            cart.push(item);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center border-b border-gray-800 pb-2">
                    <span class="text-sm">${item.name}</span>
                    <span class="text-red-500 font-bold">$${item.price}</span>
                </div>
            `).join('');
        }

        function downloadAsset(name) {
            alert(`Starting download for: ${name}\nIn a real app, this would trigger a file stream.`);
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        renderProducts();
    </script>
</body>
</html>
