<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON EDIT | Admin Dashboard & Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .neon-blue { text-shadow: 0 0 10px #3b82f6; border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .neon-green { text-shadow: 0 0 10px #22c55e; border-color: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .neon-red { text-shadow: 0 0 10px #ef4444; border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <nav class="glass fixed w-full z-50 p-4 flex justify-between items-center px-10">
        <h1 class="text-2xl font-black tracking-tighter">NEON<span class="text-blue-500">EDIT</span></h1>
        <button onclick="document.getElementById('admin-panel').classList.toggle('hidden')" class="text-xs border border-gray-600 px-3 py-1 rounded hover:neon-blue">ADMIN PANEL</button>
    </nav>

    <section id="admin-panel" class="hidden pt-24 px-10">
        <div class="glass p-8 rounded-2xl max-w-2xl mx-auto border-blue-500 border">
            <h2 class="text-xl font-bold mb-4 neon-blue">Upload New Asset</h2>
            <div class="grid grid-cols-2 gap-4">
                <input id="assetName" type="text" placeholder="Asset Name" class="bg-black border border-gray-700 p-2 rounded outline-none focus:border-blue-500">
                <select id="assetType" class="bg-black border border-gray-700 p-2 rounded">
                    <option value="VFX">VFX</option>
                    <option value="SFX">SFX</option>
                    <option value="Clip">Cinematic Clip</option>
                </select>
                <input id="assetPrice" type="number" placeholder="Price (0 for Free)" class="bg-black border border-gray-700 p-2 rounded outline-none">
                <input id="assetImg" type="text" placeholder="Thumbnail URL (Imgur link)" class="bg-black border border-gray-700 p-2 rounded outline-none">
            </div>
            <button onclick="handleUpload()" class="w-full mt-4 bg-blue-600 py-2 rounded font-bold hover:neon-blue">PUBLISH ASSET</button>
        </div>
    </section>

    <section class="pt-40 pb-20 text-center">
        <h1 class="text-7xl font-black mb-4">UPGRADE YOUR <span class="text-blue-500 neon-blue">EDITS</span></h1>
        <p class="text-gray-400">Premium VFX, SFX & Overlays for Pro Editors</p>
    </section>

    <div id="market-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 px-10 pb-20">
        </div>

    <script>
        // Data Store (Yeh browser ki memory mein save hoga)
        let myAssets = JSON.parse(localStorage.getItem('neonAssets')) || [
            { name: "Sample Glitch", type: "VFX", price: 0, img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=400" }
        ];

        function renderMarket() {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = myAssets.map((item, index) => `
                <div class="glass p-4 rounded-xl border border-gray-800 hover:neon-blue transition duration-300">
                    <img src="${item.img}" class="w-full h-40 object-cover rounded-lg mb-4">
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold">${item.name}</h3>
                        <span class="${item.price == 0 ? 'text-green-500 neon-green' : 'text-red-500 neon-red'} font-bold">
                            ${item.price == 0 ? 'FREE' : '$' + item.price}
                        </span>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">${item.type}</p>
                    <button class="w-full mt-4 py-2 border ${item.price == 0 ? 'border-green-500 text-green-500 hover:bg-green-500' : 'border-red-500 text-red-500 hover:bg-red-500'} hover:text-black rounded font-bold transition">
                        ${item.price == 0 ? 'DOWNLOAD' : 'ADD TO CART'}
                    </button>
                    <button onclick="deleteAsset(${index})" class="mt-2 text-[10px] text-gray-600 hover:text-red-500">Remove from store</button>
                </div>
            `).join('');
        }

        function handleUpload() {
            const name = document.getElementById('assetName').value;
            const type = document.getElementById('assetType').value;
            const price = document.getElementById('assetPrice').value;
            const img = document.getElementById('assetImg').value || "https://via.placeholder.com/400x225/000000/FFFFFF?text=No+Preview";

            if(!name || !price) return alert("Please fill details");

            const newAsset = { name, type, price: parseInt(price), img };
            myAssets.push(newAsset);
            
            // Save to browser memory
            localStorage.setItem('neonAssets', JSON.stringify(myAssets));
